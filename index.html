        function renderRecipes(filtered) {
            const container = document.getElementById('recipes-container');
            container.innerHTML = '';
            const list = filtered || recipes;
            
            list.forEach(r => {
                const hasFull = r.ingredients[0] !== "See book for full recipe";
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <div class="card-image">
                        <i class="fas fa-utensils" style="color: rgba(255,255,255,0.7); font-size: 38px;"></i>
                    </div>
                    <div class="card-content">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
                            <h3 style="font-weight: 600; font-size: 14px; line-height: 1.3; margin: 0; padding-right: 6px;">${r.title}</h3>
                            ${hasFull ? `<div style="background: #166534; color: white; font-size: 8px; padding: 1px 5px; border-radius: 9999px; font-weight: 600;">FULL</div>` : `<div style="background: #e5e7eb; color: #6b7280; font-size: 8px; padding: 1px 5px; border-radius: 9999px; font-weight: 600;">BOOK</div>`}
                        </div>
                        <div style="margin-bottom: 6px;">
                            <span class="time-badge">${r.bestTime}</span>
                        </div>
                        <p style="font-size: 12px; color: #6b7280; margin: 0 0 8px; line-height: 1.3;">${r.benefits}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 11px;">
                            <span style="color: #9ca3af;">${r.servings} servings</span>
                            <span style="color: #166534; font-weight: 600;">${hasFull ? 'View' : 'See Book'}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => showModal(r);
                container.appendChild(card);
            });
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.menu-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            const container = document.getElementById('recipes-container');
            container.innerHTML = '';
            
            let filtered = recipes;
            if (cat !== 'all') filtered = recipes.filter(r => r.category === cat);
            
            filtered.forEach(r => {
                const hasFull = r.ingredients[0] !== "See book for full recipe";
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <div class="card-image">
                        <i class="fas fa-utensils" style="color: rgba(255,255,255,0.7); font-size: 38px;"></i>
                    </div>
                    <div class="card-content">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
                            <h3 style="font-weight: 600; font-size: 14px; line-height: 1.3; margin: 0; padding-right: 6px;">${r.title}</h3>
                            ${hasFull ? `<div style="background: #166534; color: white; font-size: 8px; padding: 1px 5px; border-radius: 9999px; font-weight: 600;">FULL</div>` : `<div style="background: #e5e7eb; color: #6b7280; font-size: 8px; padding: 1px 5px; border-radius: 9999px; font-weight: 600;">BOOK</div>`}
                        </div>
                        <div style="margin-bottom: 6px;">
                            <span class="time-badge">${r.bestTime}</span>
                        </div>
                        <p style="font-size: 12px; color: #6b7280; margin: 0 0 8px; line-height: 1.3;">${r.benefits}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 11px;">
                            <span style="color: #9ca3af;">${r.servings} servings</span>
                            <span style="color: #166534; font-weight: 600;">${hasFull ? 'View' : 'See Book'}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => showModal(r);
                container.appendChild(card);
            });
        }

        function showModal(r) {
            const modal = document.getElementById('recipe-modal');
            const content = document.getElementById('modal-content');
            const hasFull = r.ingredients[0] !== "See book for full recipe";
            
            let html = `
                <div style="padding: 20px 20px 30px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px;">
                        <div style="flex: 1; padding-right: 10px;">
                            <h2 style="font-size: 22px; font-weight: 700; margin: 0 0 6px;">${r.title}</h2>
                            <div style="margin-bottom: 6px;"><span class="time-badge" style="font-size: 11px; padding: 3px 9px;">${r.bestTime}</span></div>
                            <div style="color: #166534; font-size: 13px;">${r.benefits}</div>
                        </div>
                        <button onclick="hideModal()" style="font-size: 32px; color: #9ca3af; background: none; border: none; padding: 0;">×</button>
                    </div>
                    
                    <div style="display: flex; gap: 16px; font-size: 13px; margin-bottom: 16px;">
                        <div><i class="fas fa-clock" style="color: #166534;"></i> <strong>${r.time}</strong></div>
                        <div><i class="fas fa-users" style="color: #166534;"></i> <strong>${r.servings}</strong> servings</div>
                    </div>
            `;
            
            if (hasFull) {
                html += `
                    <div>
                        <div style="font-size: 10px; font-weight: 600; color: #6b7280; margin-bottom: 6px;">INGREDIENTS</div>
                        <div style="margin-bottom: 16px; font-size: 14px; line-height: 1.5;">
                            ${r.ingredients.map(i => `<div style="margin-bottom: 3px;">• ${i}</div>`).join('')}
                        </div>
                        
                        <div style="font-size: 10px; font-weight: 600; color: #6b7280; margin-bottom: 6px;">METHOD</div>
                        <div style="font-size: 14px; line-height: 1.5; white-space: pre-line;">${r.method}</div>
                    </div>
                `;
            } else {
                html += `
                    <div style="background: #f3f4f6; border-radius: 14px; padding: 20px; text-align: center; margin-top: 10px;">
                        <div style="font-size: 26px; margin-bottom: 6px;">📖</div>
                        <div style="font-weight: 600;">Full recipe available in the book</div>
                        <div style="font-size: 12px; color: #6b7280; margin-top: 4px;">"A Taste of Well-Being" by Sadhguru</div>
                    </div>
                `;
            }
            
            html += `
                    <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end;">
                        <button onclick="hideModal()" style="background: #1f2937; color: white; border: none; padding: 10px 24px; border-radius: 9999px; font-size: 13px; font-weight: 600;">Close</button>
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
            modal.classList.add('active');
        }

        function hideModal() {
            document.getElementById('recipe-modal').classList.remove('active');
        }

        function init() {
            renderRecipes(recipes);
            console.log('%c[Final Version] 100 recipes loaded successfully', 'color:#166534');
        }
        
        window.onload = init;
    </script>
